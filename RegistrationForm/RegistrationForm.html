<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="RegistrationForm.css" rel="stylesheet">
</head>
<body>
    <div class ="container">
        <h1>Registration Form</h1>

        <label for = "name">Student Name:</label>
        <input type = "name" id ="name" name ="name" required>
        <BR>

          <label for = "roll">Addmission Number:</label>
        <input type = "text" id ="name" name ="text" required>
        <BR>

         <label for = "course">Course Name:</label>
        <select id ="course" name ="course" required>
            <option value="">Select Course</option>
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="BTECH">BTECH</option>
            <option value="MBA">MBA</option>
    </select>
<br>
    <label for="subject">Subject:</label>
    <div class="options">
   <label> <input type="checkbox" id="subject" name="subject" value="DBMS">DBMS</label>
    <label> <input type="checkbox" id="subject" name="subject" value="WEB SERVER">WEB SERVER</label>
     <label> <input type="checkbox" id="subject" name="subject" value="AEC">AEC</label>
    <label> <input type="checkbox" id="subject" name="subject" value="UHV">UHV</label>
     <label> <input type="checkbox" id="subject" name="subject" value="AUTOMATA">AUTOMATA</label>
     </div><br>
         <label for="gender">Gender:</label>
        <div class="gender-group">
          <label><input type="radio" name="gender" value="Male"> Male</label>
          <label><input type="radio" name="gender" value="Female"> Female</label>
          <label><input type="radio" name="gender" value="Other"> Other</label>
        </div><br>
          <label for="email">Email ID:</label>
        <input type="email" id="email" name="email" placeholder="example@gmail.com" ><br>

         <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>
        <br>
            <label for="phone">Phone Number:</label>
           <input type="tel" id="phone" name="phone" placeholder="10-digit number" 
pattern="[0-9]{10}" required title="Enter 10 digits only.">
       
     <div class="btn-container">
        <button type="submit">Submit Application</button>
   
      </div>
  
    
    
</body>
</html>
